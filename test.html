<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimalist Landing Page</title>
  <style>
    :root {
      --primary: #2d3748;
      --accent: #3182ce;
      --light: #f7fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body,
    html {
      height: 100%;
      background: var(--light);
      color: var(--primary);
      line-height: 1.5;
    }

    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: 100vh;
      padding: 0 1rem;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      max-width: 40rem;
      margin-bottom: 2rem;
    }

    .cta {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease-in-out;
    }

    .cta:hover,
    .cta:focus {
      background: #2b6cb0;
      outline: none;
    }

    footer {
      position: fixed;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.875rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Welcome to Minimal</h1>
    <p>A clean and simple landing page to get you started quickly. Build, launch, and grow with<br />focus and clarity.</p>
    <button class="cta" onclick="alert('Thanks for clicking!')">Get Started</button>
  </main>
  <footer>&copy; <span id="year"></span> Minimal Inc.</footer>

  <script>
    // Update the footer year automatically
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
