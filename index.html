<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理 - プロフェッショナル在庫管理システム</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-boxes"></i>
                    <h1>在庫管理</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-item">
                        <span class="stat-label">総アイテム数</span>
                        <span class="stat-value" id="totalItems">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">在庫不足</span>
                        <span class="stat-value warning" id="lowStockCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">総価値</span>
                        <span class="stat-value" id="totalValue">$0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Controls Section -->
            <section class="controls-section">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="商品名、SKU、カテゴリで検索...">
                </div>
                
                <div class="filter-controls">
                    <select id="categoryFilter">
                        <option value="">全てのカテゴリ</option>
                        <option value="Electronics">電子機器</option>
                        <option value="Clothing">衣類</option>
                        <option value="Books">書籍</option>
                        <option value="Home & Garden">ホーム＆ガーデン</option>
                        <option value="Sports">スポーツ</option>
                        <option value="Other">その他</option>
                    </select>
                    
                    <select id="stockFilter">
                        <option value="">全ての在庫レベル</option>
                        <option value="in-stock">在庫あり</option>
                        <option value="low-stock">在庫不足</option>
                        <option value="out-of-stock">在庫切れ</option>
                    </select>
                    
                    <button class="btn btn-primary" id="addItemBtn">
                        <i class="fas fa-plus"></i>
                        アイテム追加
                    </button>
                </div>
            </section>

            <!-- Inventory Table -->
            <section class="inventory-section">
                <div class="table-container">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>アイテム名</th>
                                <th>SKU</th>
                                <th>カテゴリ</th>
                                <th>数量</th>
                                <th>単価</th>
                                <th>総価値</th>
                                <th>状態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <!-- Dynamic content will be inserted here -->
                        </tbody>
                    </table>
                    
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-box-open"></i>
                        <h3>在庫にアイテムがありません</h3>
                        <p>最初のアイテムを在庫に追加してください</p>
                        <button class="btn btn-primary" onclick="openAddItemModal()">
                            <i class="fas fa-plus"></i>
                            最初のアイテムを追加
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Add/Edit Item Modal -->
        <div class="modal-overlay" id="itemModal">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">新規アイテム追加</h2>
                    <button class="close-btn" onclick="closeItemModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form class="modal-form" id="itemForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemName">アイテム名 *</label>
                            <input type="text" id="itemName" required>
                        </div>
                        <div class="form-group">
                            <label for="itemSku">SKU *</label>
                            <input type="text" id="itemSku" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemCategory">カテゴリ *</label>
                            <select id="itemCategory" required>
                                <option value="">カテゴリを選択</option>
                                <option value="Electronics">電子機器</option>
                                <option value="Clothing">衣類</option>
                                <option value="Books">書籍</option>
                                <option value="Home & Garden">ホーム＆ガーデン</option>
                                <option value="Sports">スポーツ</option>
                                <option value="Other">その他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="itemQuantity">数量 *</label>
                            <input type="number" id="itemQuantity" min="0" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itemPrice">単価 *</label>
                            <input type="number" id="itemPrice" step="0.01" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="minStock">最小在庫レベル</label>
                            <input type="number" id="minStock" min="0" value="5">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="itemDescription">説明</label>
                        <textarea id="itemDescription" rows="3" placeholder="オプションのアイテム説明..."></textarea>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeItemModal()">キャンセル</button>
                        <button type="submit" class="btn btn-primary" id="saveItemBtn">アイテムを保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div class="modal-overlay" id="deleteModal">
            <div class="modal modal-small">
                <div class="modal-header">
                    <h2>削除の確認</h2>
                    <button class="close-btn" onclick="closeDeleteModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div class="modal-content">
                    <p>このアイテムを削除してもよろしいですか？この操作は元に戻せません。</p>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">キャンセル</button>
                        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">削除</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
